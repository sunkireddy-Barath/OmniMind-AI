version: '3.8'

services:
  web:
    build:
      context: ../apps/web
      dockerfile: ../docker/web.Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api

  api:
    build:
      context: ../apps/api
      dockerfile: ../docker/api.Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      - data-memory
      - knowledge

  agent-engine:
    build:
      context: ../services/agent-engine
      dockerfile: ../docker/agent-engine.Dockerfile
    depends_on:
      - api

  knowledge:
    build:
      context: ../services/knowledge
      dockerfile: ../docker/knowledge.Dockerfile
    depends_on:
      - data-memory

  data-memory:
    build:
      context: ../services/data-memory
      dockerfile: ../docker/data-memory.Dockerfile
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=your_db_name
      - POSTGRES_USER=your_user
      - POSTGRES_PASSWORD=your_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: