version: "3.9"

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      # DigitalOcean Gradient AI — set these in .env
      - GRADIENT_API_KEY=${GRADIENT_API_KEY}
      - GRADIENT_BASE_URL=${GRADIENT_BASE_URL:-https://inference.do-ai.run/v1}
      - GRADIENT_WORKSPACE_ID=${GRADIENT_WORKSPACE_ID}
      - LLM_MODEL=${LLM_MODEL:-llama3-1-70b-instruct}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-2048}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      # Vector DB
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=omnimind_knowledge
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      # Database
      - DATABASE_URL=postgresql+asyncpg://omnimind:omnimind@postgres:5432/omnimind
      # Redis
      - REDIS_URL=redis://redis:6379
    depends_on:
      - qdrant
      - redis
      - postgres
    volumes:
      - ./backend:/app
    working_dir: /app

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=omnimind
      - POSTGRES_PASSWORD=omnimind
      - POSTGRES_DB=omnimind
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  qdrant_data:
  redis_data:
  postgres_data:
